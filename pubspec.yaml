name: mygate_clone
description: A Flutter application for society management with multi-role support.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.0.0
  riverpod: ^2.0.0

  # Backend & API
  supabase_flutter: ^2.12.0
  dio: ^5.3.0
  flutter_dotenv: ^5.1.0

  # Authentication
  firebase_auth: ^4.10.0
  sign_in_with_apple: ^6.1.0  

  # Notifications
  firebase_messaging: ^14.6.0

  # Local Storage
  shared_preferences: ^2.2.0
  hive: ^2.2.0
  hive_flutter: ^1.1.0

  # UI & Navigation
  go_router: ^11.0.0
  google_fonts: ^6.0.0
  flutter_svg: ^2.0.0

  # Date & Time
  intl: ^0.19.0

  # Utilities
  get_it: ^7.6.0
  logger: ^2.0.0

  # File Upload & Picker
  file_picker: ^10.3.10
  image_picker: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  hive_generator: ^2.0.0
  build_runner: ^2.4.0
  mocktail: ^1.0.0
  test: ^1.24.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/
    - assets/icons/
    - assets/images/
    - assets/branding/
    - assets/fonts/GoogleSans-Regular.ttf
    - assets/fonts/GoogleSans-Bold.ttf

  fonts:
    - family: GoogleSans
      fonts:
        - asset: assets/fonts/GoogleSans-Regular.ttf
        - asset: assets/fonts/GoogleSans-Bold.ttf
          weight: 700
